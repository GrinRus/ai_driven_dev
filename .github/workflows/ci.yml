---
name: CI

'on':
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '30 2 * * *'

env:
  AIDD_SECURITY_ENFORCE: ${{ vars.AIDD_SECURITY_ENFORCE || '1' }}
  AIDD_SKILL_EVAL_ENFORCE: ${{ vars.AIDD_SKILL_EVAL_ENFORCE || '0' }}
  AIDD_SKILL_EVAL_BASELINE: ${{ vars.AIDD_SKILL_EVAL_BASELINE || '' }}
  AIDD_SKILL_EVAL_ADVISORY_PRS: ${{ vars.AIDD_SKILL_EVAL_ADVISORY_PRS || '0' }}
  AIDD_SKILL_EVAL_ADVISORY_DAYS: >-
    ${{ vars.AIDD_SKILL_EVAL_ADVISORY_DAYS || '0' }}
  AIDD_SKILL_EVAL_NIGHTLY_STREAK: >-
    ${{ vars.AIDD_SKILL_EVAL_NIGHTLY_STREAK || '0' }}

jobs:
  dist-check:
    name: dist-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Validate distribution bundle artifacts
        run: |
          python3 tests/repo_tools/entrypoints_bundle.py \
            --root "${GITHUB_WORKSPACE}"
          git diff --exit-code -- tests/repo_tools/entrypoints-bundle.txt
          python3 tests/repo_tools/build_e2e_prompts.py --check

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch origin "${GITHUB_BASE_REF}:${GITHUB_BASE_REF}"

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint ripgrep python3-pytest
          npm install -g markdownlint-cli

      - name: Run ci-lint script
        run: tests/repo_tools/ci-lint.sh

      - name: Bootstrap AIDD workspace for QA gate
        run: |
          QA_WORKSPACE="$(mktemp -d)"
          echo "QA_WORKSPACE=${QA_WORKSPACE}" >> "${GITHUB_ENV}"
          cd "${QA_WORKSPACE}"
          CLAUDE_PLUGIN_ROOT="${GITHUB_WORKSPACE}" \
            PYTHONPATH="${GITHUB_WORKSPACE}" \
            python3 "${GITHUB_WORKSPACE}/skills/aidd-init/runtime/init.py"

      - name: Run QA gate
        run: |
          cd "${QA_WORKSPACE}"
          if [[ -n "${GITHUB_BASE_REF}" ]]; then
            export QA_AGENT_DIFF_BASE="${GITHUB_BASE_REF}"
          else
            unset QA_AGENT_DIFF_BASE
          fi
          export CLAUDE_PLUGIN_ROOT="${GITHUB_WORKSPACE}"
          "${GITHUB_WORKSPACE}/hooks/gate-qa.sh" --payload '{}'

  smoke-workflow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Detect runtime changes
        id: runtime_changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            runtime:
              - 'skills/**'
              - 'hooks/**'
              - 'tools/**'
              - 'agents/**'
              - 'templates/aidd/**'
              - '.claude-plugin/**'

      - name: Run smoke workflow
        if: steps.runtime_changes.outputs.runtime == 'true'
        run: tests/repo_tools/smoke-workflow.sh

      - name: Skip smoke workflow (no runtime changes)
        if: steps.runtime_changes.outputs.runtime != 'true'
        run: echo "No runtime changes; skipping smoke"

  skills-eval-smoke:
    name: skills-eval-smoke
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.AIDD_SKILL_EVAL_ENFORCE != '1' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run skill eval smoke (38 cases)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 tests/repo_tools/skill_eval_run.py \
            --cases tests/repo_tools/skill_eval/cases.v1.jsonl \
            --max-cases 38 \
            --seed 104 \
            --out-dir aidd/reports/events/skill-eval

      - name: Skill eval rollout notice
        if: ${{ env.AIDD_SKILL_EVAL_ENFORCE != '1' }}
        run: |
          echo "skills-eval-smoke is advisory"
          echo "set AIDD_SKILL_EVAL_ENFORCE=1 to make it required"

  skills-eval-full:
    name: skills-eval-full
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.AIDD_SKILL_EVAL_ENFORCE != '1' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run skill eval full (190 cases)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 tests/repo_tools/skill_eval_run.py \
            --cases tests/repo_tools/skill_eval/cases.v1.jsonl \
            --seed 104 \
            --out-dir aidd/reports/events/skill-eval

      - name: Upload skill eval artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: skill-eval-full-${{ github.run_id }}
          path: aidd/reports/events/skill-eval
          if-no-files-found: ignore

      - name: Compare with baseline (optional)
        if: always()
        run: |
          if [[ -z "${AIDD_SKILL_EVAL_BASELINE}" \
            || ! -f "${AIDD_SKILL_EVAL_BASELINE}" ]]; then
            echo "Skill eval baseline is not configured in this workflow run"
            if [[ "${AIDD_SKILL_EVAL_ENFORCE}" == "1" ]]; then
              exit 1
            fi
            exit 0
          fi
          CANDIDATE="$(
            find aidd/reports/events/skill-eval -type f \
              -path '*/run-*/summary.json' -print 2>/dev/null \
              | sort | tail -n 1 || true
          )"
          if [[ -z "${CANDIDATE}" || ! -f "${CANDIDATE}" ]]; then
            echo "Candidate summary not found; skipping compare"
            if [[ "${AIDD_SKILL_EVAL_ENFORCE}" == "1" ]]; then
              exit 1
            fi
            exit 0
          fi
          python3 tests/repo_tools/skill_eval_compare.py \
            --baseline "${AIDD_SKILL_EVAL_BASELINE}" \
            --candidate "${CANDIDATE}" \
            --out aidd/reports/events/skill-eval/compare.latest.json

      - name: Skill eval rollout notice
        if: ${{ env.AIDD_SKILL_EVAL_ENFORCE != '1' }}
        run: |
          echo "skills-eval-full is advisory"
          echo "set AIDD_SKILL_EVAL_ENFORCE=1 to make it required"

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency review
        uses: >-
          actions/dependency-review-action@9129d7d40b8c12c1ed0f60400d00c92d437adcce
        with:
          fail-on-severity: high

  security-secret-scan:
    name: security-secret-scan
    runs-on: ubuntu-latest
    continue-on-error: ${{ (vars.AIDD_SECURITY_ENFORCE || '1') != '1' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security rollout notice
        if: ${{ env.AIDD_SECURITY_ENFORCE != '1' }}
        run: |
          echo "security-secret-scan is advisory"
          echo "set AIDD_SECURITY_ENFORCE=1 to make it required"

  security-sast:
    name: security-sast
    runs-on: ubuntu-latest
    continue-on-error: ${{ (vars.AIDD_SECURITY_ENFORCE || '1') != '1' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: >-
          github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98
        with:
          languages: python

      - name: Autobuild
        uses: >-
          github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98

      - name: Analyze
        uses: >-
          github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98

      - name: Security rollout notice
        if: ${{ env.AIDD_SECURITY_ENFORCE != '1' }}
        run: |
          echo "security-sast is advisory"
          echo "set AIDD_SECURITY_ENFORCE=1 to make it required"
